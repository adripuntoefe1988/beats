      var(--bg);
    color:var(--text);
    font-family:"Space Grotesk",system-ui,sans-serif;
    line-height:1.5;
    padding-bottom:154px;
    min-height:100vh;
    overflow-x:hidden;
  }
  .mono{font-family:"JetBrains Mono",ui-monospace,monospace}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 20px;position:relative;z-index:1}

  /* ── Hero ───────────────────────────────────────────────── */
  header{padding:60px 0 40px;text-align:center}
  .logo{
    height:104px;width:auto;display:block;margin:0 auto 30px;
    filter:drop-shadow(0 6px 28px rgba(233,160,92,.22));
  }
  .headline{
    font-size:clamp(30px,5.6vw,52px);font-weight:700;line-height:1.05;
    letter-spacing:-.02em;margin:0 auto 16px;max-width:16ch;
  }
  .headline .accent{color:var(--copper)}
  .tagline{color:var(--text-dim);font-size:clamp(15px,2.2vw,18px);max-width:48ch;margin:0 auto}
  .header-foot{
    display:flex;flex-wrap:wrap;gap:14px;align-items:center;justify-content:center;
    margin-top:30px;
  }
  .contact-btn{
    display:inline-flex;align-items:center;gap:8px;
    background:var(--copper);color:#190f06;
    font-weight:600;font-size:14px;
    padding:12px 22px;border-radius:999px;text-decoration:none;
    transition:transform .15s ease, background .15s ease, box-shadow .15s ease;
    box-shadow:0 6px 20px rgba(233,160,92,.25);
  }
  .contact-btn:hover{background:#f4b272;transform:translateY(-2px);box-shadow:0 10px 28px rgba(233,160,92,.35)}
  .contact-btn.alt{background:transparent;color:var(--copper);border:1px solid var(--copper-deep);box-shadow:none}
  .contact-btn.alt:hover{background:var(--surface-2);color:var(--copper);transform:translateY(-2px)}
  .count-pill{
    font-family:"JetBrains Mono",monospace;font-size:12px;
    color:var(--text-dim);border:1px solid var(--line);
    padding:9px 15px;border-radius:999px;
  }
  .count-pill b{color:var(--text)}

  /* ── Buscador ───────────────────────────────────────────── */
  .toolbar{display:flex;gap:12px;align-items:center;margin:10px 0 22px}
  .search{position:relative;flex:1;max-width:360px;margin:0 auto}
  .search input{
    width:100%;background:var(--surface);border:1px solid var(--line);
    color:var(--text);font-family:inherit;font-size:14px;
    padding:12px 14px 12px 40px;border-radius:11px;outline:none;
    transition:border-color .15s ease, box-shadow .15s ease;text-align:left;
  }
  .search input::placeholder{color:var(--text-faint)}
  .search input:focus{border-color:var(--copper-deep);box-shadow:0 0 0 3px var(--copper-glow)}
  .search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);
    width:15px;height:15px;stroke:var(--text-faint)}

  /* ── Lista de tracks ────────────────────────────────────── */
  .tracklist{
    border:1px solid var(--line);border-radius:var(--radius);
    overflow:hidden;background:var(--surface);
  }
  .track{
    display:grid;
    grid-template-columns:34px 44px 1fr auto auto auto auto auto;
    align-items:center;gap:14px;
    padding:14px 18px;
    border-bottom:1px solid var(--line);
    cursor:pointer;position:relative;
    transition:background .14s ease;
  }
  .track:last-child{border-bottom:none}
  .track:hover{background:var(--surface-2)}
  .track.active{background:linear-gradient(90deg,var(--copper-glow),transparent 70%)}
  .track.active::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--copper)}
  .track.active .t-title{color:var(--copper)}

  .t-num-wrap{display:flex;align-items:center;justify-content:center}
  .t-num{font-family:"JetBrains Mono",monospace;font-size:13px;color:var(--text-faint)}
  .track.active .t-num,.track:hover .t-num{opacity:0}

  .t-play{
    width:44px;height:44px;border-radius:50%;
    border:1px solid var(--line);background:var(--surface-2);
    display:flex;align-items:center;justify-content:center;
    color:var(--text);flex-shrink:0;transition:all .15s ease;position:relative;
  }
  .track:hover .t-play{border-color:var(--copper-deep);color:var(--copper)}
  .track.active .t-play{background:var(--copper);border-color:var(--copper);color:#190f06}
  .t-play svg{width:15px;height:15px;fill:currentColor}

  /* ecualizador animado en el track que suena */
  .eq{display:none;gap:2.5px;align-items:flex-end;height:15px}
  .track.active.playing .t-play svg{display:none}
  .track.active.playing .eq{display:flex}
  .eq span{width:3px;height:100%;background:#190f06;border-radius:2px;transform-origin:bottom;animation:eq .9s ease-in-out infinite}
  .eq span:nth-child(2){animation-delay:.25s}
  .eq span:nth-child(3){animation-delay:.5s}
  .eq span:nth-child(4){animation-delay:.1s}
  @keyframes eq{0%,100%{transform:scaleY(.32)}50%{transform:scaleY(1)}}

  .t-meta{min-width:0}
  .t-title{font-weight:600;font-size:15.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .t-tags{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap}
  .t-tag{
    font-family:"JetBrains Mono",monospace;font-size:10.5px;letter-spacing:.04em;
    color:var(--text-dim);background:var(--surface-2);
    padding:2px 8px;border-radius:5px;border:1px solid var(--line);
  }

  .t-data{font-family:"JetBrains Mono",monospace;font-size:12.5px;text-align:right;line-height:1.3}
  .t-data .lab{display:block;font-size:9px;letter-spacing:.12em;color:var(--text-faint);text-transform:uppercase}
  .t-data .val{color:var(--text-dim)}

  /* botón "lo quiero" / compra */
  .t-want{
    display:inline-flex;align-items:center;gap:6px;white-space:nowrap;
    font-size:12.5px;font-weight:600;color:var(--copper);
    border:1px solid var(--copper-deep);background:transparent;
    padding:8px 13px;border-radius:9px;text-decoration:none;
    opacity:0;transform:translateX(6px);
    transition:all .16s ease;
  }
  .track:hover .t-want,.track.active .t-want{opacity:1;transform:none}
  .t-want:hover{background:var(--copper);color:#190f06}
  .t-want svg{width:13px;height:13px;fill:currentColor}

  .t-dl{
    width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;
    color:var(--text-faint);border:1px solid transparent;text-decoration:none;transition:all .15s ease;
  }
  .t-dl:hover{color:var(--copper);border-color:var(--line);background:var(--surface-2)}
  .t-dl svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8}
  .t-dl.hidden{visibility:hidden}

  /* ── Reproductor fijo ───────────────────────────────────── */
  .player{
    position:fixed;left:0;right:0;bottom:0;z-index:50;
    background:rgba(18,13,11,.9);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border-top:1px solid var(--line);
    transform:translateY(120%);transition:transform .4s cubic-bezier(.4,0,.2,1);
  }
  .player.up{transform:translateY(0)}
  .player-inner{
    max-width:var(--maxw);margin:0 auto;padding:14px 20px 16px;
    display:grid;grid-template-columns:230px 1fr 150px;gap:20px;align-items:center;
  }
  .pl-now{min-width:0;display:flex;flex-direction:column;gap:2px}
  .pl-now .lab{font-family:"JetBrains Mono",monospace;font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--copper)}
  .pl-now .title{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pl-now .sub{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--text-dim)}
  .pl-want{
    display:inline-flex;align-items:center;gap:6px;width:fit-content;margin-top:5px;
    font-size:12px;font-weight:600;color:#190f06;background:var(--copper);
    padding:6px 13px;border-radius:8px;text-decoration:none;transition:background .15s ease;
  }
  .pl-want:hover{background:#f4b272}
  .pl-want svg{width:12px;height:12px;fill:currentColor}

  .pl-center{display:flex;flex-direction:column;gap:8px;min-width:0}
  .pl-controls{display:flex;align-items:center;justify-content:center;gap:16px}
  .pl-btn{background:none;border:none;color:var(--text-dim);cursor:pointer;display:flex;padding:4px;transition:color .15s ease}
  .pl-btn:hover{color:var(--text)}
  .pl-btn svg{width:20px;height:20px;fill:currentColor}
  .pl-play{
    width:48px;height:48px;border-radius:50%;background:var(--copper);color:#190f06;
    display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;
    transition:transform .15s ease,background .15s ease;flex-shrink:0;
    box-shadow:0 4px 16px rgba(233,160,92,.3);
  }
  .pl-play:hover{background:#f4b272;transform:scale(1.06)}
  .pl-play svg{width:20px;height:20px;fill:currentColor}

  .pl-wave{display:flex;align-items:center;gap:11px}
  .pl-time{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--text-dim);flex-shrink:0;width:38px}
  .pl-time.end{text-align:right}
  canvas.wave{flex:1;height:46px;cursor:pointer;display:block;min-width:0}

  .pl-vol{display:flex;align-items:center;gap:9px;justify-content:flex-end}
  .pl-vol svg{width:17px;height:17px;fill:var(--text-dim);flex-shrink:0}
  input[type=range].vol{
    -webkit-appearance:none;appearance:none;width:84px;height:4px;border-radius:2px;
    background:var(--line);outline:none;cursor:pointer;
  }
  input[type=range].vol::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--copper);cursor:pointer}
  input[type=range].vol::-moz-range-thumb{width:13px;height:13px;border:none;border-radius:50%;background:var(--copper);cursor:pointer}

  .err{font-family:"JetBrains Mono",monospace;font-size:10.5px;color:#e08a6a;margin-top:3px;display:none}
  .err.show{display:block}

  /* ── Pie ────────────────────────────────────────────────── */
  footer{padding:48px 0 34px;text-align:center}
  .footer-logo{height:42px;width:auto;opacity:.55;margin-bottom:16px}
  footer .mono{font-size:11px;letter-spacing:.04em;color:var(--text-faint)}

  /* ── Animación de entrada ───────────────────────────────── */
  .reveal{opacity:0;transform:translateY(16px);animation:reveal .7s cubic-bezier(.22,.7,.3,1) forwards}
  .d1{animation-delay:.05s}.d2{animation-delay:.15s}.d3{animation-delay:.25s}.d4{animation-delay:.35s}.d5{animation-delay:.45s}
  @keyframes reveal{to{opacity:1;transform:none}}

  /* ── Responsive ─────────────────────────────────────────── */
  @media(max-width:760px){
    body{background-attachment:scroll}
    .track{grid-template-columns:30px 44px 1fr auto auto;gap:11px;padding:13px 14px}
    .t-data.key,.t-dl{display:none}
    .t-want{opacity:1;transform:none;padding:8px 11px}
    .player-inner{grid-template-columns:1fr;gap:12px;padding:12px 14px 16px}
    .pl-now{text-align:center;align-items:center}
    .pl-vol{display:none}
    body{padding-bottom:184px}
    .pl-now .title{white-space:normal}
  }
  @media(max-width:430px){
    .track{grid-template-columns:44px 1fr auto;gap:10px}
    .t-num-wrap{display:none}
    .t-data.bpm{display:none}
    .t-want span{display:none}
    .t-want{padding:9px}
  }

  @media(prefers-reduced-motion:reduce){
    *{transition:none!important;animation:none!important}
    .reveal{opacity:1;transform:none}
    .eq span{transform:scaleY(.7)}
  }
  :focus-visible{outline:2px solid var(--copper);outline-offset:2px;border-radius:6px}
</style>
</head>

  $("#contact-email").href = CONFIG.emailLink || CONFIG.contactLink;
  $("#footer-text").textContent = CONFIG.footer;
  $("#track-count").textContent = CONFIG.tracks.length;

  // Construye un enlace de contacto con el beat ya escrito en el asunto/mensaje
  function wantLink(title){
    const link = CONFIG.contactLink || "";
    const msg = "Me interesa el beat: " + title;
    if(link.startsWith("mailto:")){
      const base = link.split("?")[0];
      return base + "?subject=" + encodeURIComponent(msg);
    }
    if(link.includes("wa.me") || link.includes("api.whatsapp")){
      const base = link.split("?")[0];
      return base + "?text=" + encodeURIComponent(msg);
    }
    return link;
  }

  const audio = new Audio();
  audio.volume = 0.85; audio.preload = "metadata";

  let current = -1, peaks = null, peaksToken = 0, actx = null;
  const listEl=$("#tracklist"), playerEl=$("#player"), canvas=$("#wave"), ctx=canvas.getContext("2d");

  function rowHTML(t,i){
    const dl = t.download
      ? `<a class="t-dl" href="${t.file}" download title="Descargar"><svg viewBox="0 0 24 24"><path d="M12 3v12m0 0l-4-4m4 4l4-4M5 21h14"/></svg></a>`
      : `<span class="t-dl hidden"></span>`;
    return `
      <div class="track" data-i="${i}" tabindex="0" role="button" aria-label="Reproducir ${t.title}">
        <div class="t-num-wrap"><span class="t-num mono">${String(i+1).padStart(2,"0")}</span></div>
        <button class="t-play" tabindex="-1" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          <span class="eq"><span></span><span></span><span></span><span></span></span>
        </button>
        <div class="t-meta">
          <div class="t-title">${t.title}</div>
          <div class="t-tags">${(t.tags||[]).map(x=>`<span class="t-tag">${x}</span>`).join("")}</div>
        </div>
        <div class="t-data bpm"><span class="lab">BPM</span><span class="val">${t.bpm??"—"}</span></div>
        <div class="t-data key"><span class="lab">Key</span><span class="val">${t.key??"—"}</span></div>
        <div class="t-data dur"><span class="lab">Dur</span><span class="val" data-dur="${i}">–:––</span></div>
        <a class="t-want" href="${wantLink(t.title)}" data-want="${i}">
          <svg viewBox="0 0 24 24"><path d="M12 21s-7-4.6-9.5-9C.5 8.5 2 5 5.5 5 7.7 5 9 6.3 12 9c3-2.7 4.3-4 6.5-4C22 5 23.5 8.5 21.5 12 19 16.4 12 21 12 21z"/></svg>
          <span>Lo quiero</span>
        </a>
        ${dl}
      </div>`;
  }

  function render(filter=""){
    const f = filter.trim().toLowerCase();
    listEl.innerHTML = CONFIG.tracks.map((t,i)=>{
      const hay=(t.title+" "+(t.tags||[]).join(" ")).toLowerCase();
      if(f && !hay.includes(f)) return "";
      return rowHTML(t,i);
    }).join("") || `<div style="padding:40px;text-align:center;color:var(--text-faint)" class="mono">Sin resultados para “${filter}”</div>`;
    listEl.querySelectorAll(".track").forEach(row=>{
      const i=+row.dataset.i;
      if(i===current){ row.classList.add("active"); row.classList.toggle("playing",!audio.paused); updateRowIcon(row,!audio.paused); }
      row.addEventListener("click", e=>{ if(e.target.closest(".t-dl")||e.target.closest(".t-want")) return; playTrack(i); });
      row.addEventListener("keydown", e=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); playTrack(i);} });
    });
    preloadDurations();
  }

  function updateRowIcon(row, playing){
    const svg=row.querySelector(".t-play > svg");
    svg.innerHTML = playing ? '<path d="M7 5h4v14H7zm6 0h4v14h-4z"/>' : '<path d="M8 5v14l11-7z"/>';
  }

  function preloadDurations(){
    CONFIG.tracks.forEach((t,i)=>{
      const cell=listEl.querySelector(`[data-dur="${i}"]`);
      if(!cell||cell.dataset.loaded) return;
      const a=new Audio(); a.preload="metadata"; a.src=t.file;
      a.addEventListener("loadedmetadata",()=>{ if(isFinite(a.duration)){cell.textContent=fmt(a.duration);cell.dataset.loaded="1";} });
      a.addEventListener("error",()=>{ cell.textContent="—"; });
    });
  }

  function playTrack(i){
    if(i===current){ togglePlay(); return; }
    current=i; const t=CONFIG.tracks[i];
    audio.src=t.file;
    $("#pl-err").classList.remove("show");
    $("#pl-title").textContent=t.title;
    $("#pl-sub").textContent=[t.bpm?t.bpm+" BPM":"",t.key||""].filter(Boolean).join("  ·  ");
    const w=$("#pl-want"); w.href=wantLink(t.title); w.style.display="";
    playerEl.classList.add("up");
    refreshActive();
    loadWaveform(t,i);
    audio.play().catch(()=>{});
  }
  function togglePlay(){ if(current<0){playTrack(0);return;} audio.paused?audio.play().catch(()=>{}):audio.pause(); }

  function refreshActive(){
    listEl.querySelectorAll(".track").forEach(row=>{
      const i=+row.dataset.i, on=i===current;
      row.classList.toggle("active",on);
      row.classList.toggle("playing",on&&!audio.paused);
      if(on) updateRowIcon(row,!audio.paused);
    });
  }

  $("#playpause").addEventListener("click",togglePlay);
  $("#prev").addEventListener("click",()=>playTrack((current-1+CONFIG.tracks.length)%CONFIG.tracks.length));
  $("#next").addEventListener("click",()=>playTrack((current+1)%CONFIG.tracks.length));

  audio.addEventListener("play",()=>{setPlayIcon(true);refreshActive();});
  audio.addEventListener("pause",()=>{setPlayIcon(false);refreshActive();});
  audio.addEventListener("ended",()=>playTrack((current+1)%CONFIG.tracks.length));
  audio.addEventListener("error",()=>{ if(audio.src)$("#pl-err").classList.add("show"); });
  audio.addEventListener("loadedmetadata",()=>{$("#dur").textContent=fmt(audio.duration);drawWave();});
  audio.addEventListener("timeupdate",()=>{$("#cur").textContent=fmt(audio.currentTime);drawWave();});

  function setPlayIcon(p){
    $("#playpause svg").innerHTML=p?'<path d="M7 5h4v14H7zm6 0h4v14h-4z"/>':'<path d="M8 5v14l11-7z"/>';
    $("#playpause").setAttribute("aria-label",p?"Pausar":"Reproducir");
  }

  $("#vol").addEventListener("input",e=>audio.volume=+e.target.value);

  let st; $("#search").addEventListener("input",e=>{clearTimeout(st);st=setTimeout(()=>render(e.target.value),120);});

  function fallbackPeaks(title,n=160){
    let seed=0; for(const c of title) seed=(seed*31+c.charCodeAt(0))>>>0;
    const r=()=>{seed=(seed*1664525+1013904223)>>>0;return seed/4294967296;};
    const out=[]; for(let i=0;i<n;i++){const env=Math.sin((i/n)*Math.PI);out.push(0.18+(0.35*r()+0.45*env*r()));} return out;
  }
  async function loadWaveform(t,i){
    peaksToken++; const my=peaksToken;
    peaks=fallbackPeaks(t.title); drawWave();
    try{
      if(!window.AudioContext&&!window.webkitAudioContext) return;
      const resp=await fetch(t.file); if(!resp.ok) throw 0;
      const buf=await resp.arrayBuffer();
      actx=actx||new (window.AudioContext||window.webkitAudioContext)();
      const ab=await actx.decodeAudioData(buf);
      if(my!==peaksToken) return;
      peaks=extractPeaks(ab,160); drawWave();
    }catch(e){}
  }
  function extractPeaks(ab,n){
    const data=ab.getChannelData(0), block=Math.floor(data.length/n), out=[]; let max=0;
    for(let i=0;i<n;i++){let p=0;for(let j=0;j<block;j++){const v=Math.abs(data[i*block+j]||0);if(v>p)p=v;}out.push(p);if(p>max)max=p;}
    return out.map(v=>max>0?Math.max(0.05,v/max):0.05);
  }
  function drawWave(){
    if(!peaks) return;
    const dpr=window.devicePixelRatio||1, w=canvas.clientWidth, h=canvas.clientHeight;
    if(canvas.width!==w*dpr||canvas.height!==h*dpr){canvas.width=w*dpr;canvas.height=h*dpr;}
    ctx.setTransform(dpr,0,0,dpr,0,0); ctx.clearRect(0,0,w,h);
    const n=peaks.length, gap=1.5, bw=(w-(n-1)*gap)/n;
    const prog=(audio.duration&&isFinite(audio.duration))?audio.currentTime/audio.duration:0;
    const playedX=prog*w;
    const copper=getComputedStyle(document.documentElement).getPropertyValue('--copper').trim()||"#E9A05C";
    for(let i=0;i<n;i++){
      const x=i*(bw+gap), bh=Math.max(2,peaks[i]*h*0.86), y=(h-bh)/2;
      ctx.fillStyle=(x+bw/2)<=playedX?copper:"#3A2E26";
      roundRect(x,y,bw,bh,Math.min(bw/2,1.5)); ctx.fill();
    }
  }
  function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}

  canvas.addEventListener("click",e=>{
    if(current<0||!audio.duration) return;
    const rect=canvas.getBoundingClientRect();
    audio.currentTime=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width))*audio.duration;
  });
  window.addEventListener("resize",drawWave);

  document.addEventListener("keydown",e=>{
    if(e.target.matches("input")) return;
    if(e.code==="Space"){e.preventDefault();togglePlay();}
    else if(e.code==="ArrowRight"&&current>=0){audio.currentTime=Math.min(audio.duration,audio.currentTime+5);}
    else if(e.code==="ArrowLeft"&&current>=0){audio.currentTime=Math.max(0,audio.currentTime-5);}
  });

  function fmt(s){if(!isFinite(s)||s<0)return "0:00";const m=Math.floor(s/60),ss=Math.floor(s%60);return m+":"+String(ss).padStart(2,"0");}

  render();
})();
</script>
</body>
</html>
